<style>
</style>
<div style="width:100%">
	{{#collectionList}}
	<div class="amLibraryListCell">
		<table>
			<tbody>
				<tr>
					<td class="amImage"><img src="{{imageLink}}" ></td>
					<td class="amBody">
						<div class="amHeadline">{{name}}</div>
						<div class="amCheckbox">{{{checkbox}}}</div>
						<div class="amDate">Last updated: {{lastUpdatedString}}</div>
						<div class="amDescription">{{description}}</div>
					</td>
				</tr>
			</tbody>
		</table>
	</div>
	{{/collectionList}}
</div>
<input type=hidden name=LibraryCnt value="0">
<script language="JavaScript">
	function clearLibraryRows(r) {
		var c,p;
		c=document.getElementsByName('LibraryRow');
		for (p=0;p<c.length;p++){
			if(c[p].value!=r)c[p].checked=false;
		}
	}
</script>
